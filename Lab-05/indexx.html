<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB5 - JavaScript</title>
</head>
<body>
    <pre>
        <script>
            document.write('<h1 align="center"><font color="darkblue">ITEC229 - Client Side Internet and Web Programming</font></h1>');
            document.write('<h2 align="center"><font color="green">LAB5 - JavaScript</font></h2>');
            for(i = 1; i <= 10; i++) {
                document.write('\t\t<font color="red">' + i + '</font>');
            }
            document.write("<hr>");
            for(a = 1; a <= 10; a++) {
                for(b = 1; b <= 10; b++) {
                    document.write("\t\t" + a + "x" + b + "=" + (a * b));
                }
                document.write('\n\n');
            }
        </script>
    </pre>
</body>
</html>
